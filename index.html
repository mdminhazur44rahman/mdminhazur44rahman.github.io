<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Md. Minhazur Rahman Mahim | Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #ffffff; --text: #333; --sidebar: #f4f4f4; --accent: #007bff; }
        .dark { --bg: #1a1a1a; --text: #f0f0f0; --sidebar: #252525; --accent: #4da3ff; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); display: flex; transition: 0.3s; }
        
        #sidebar { width: 250px; height: 100vh; background: var(--sidebar); position: fixed; padding: 20px; transition: 0.3s; }
        main { margin-left: 250px; padding: 40px; width: 100%; }
        
        .card { border: 1px solid #ddd; padding: 15px; margin: 10px 0; border-radius: 5px; }
        .btn { display: inline-block; padding: 8px 12px; background: var(--accent); color: white; text-decoration: none; border-radius: 4px; margin-top: 10px; }
        
        @media (max-width: 768px) { #sidebar { display: none; } main { margin-left: 0; } }
    </style>
</head>
<body>

<div id="sidebar">
    <h3>Mahim</h3>
    <ul style="list-style:none; padding:0;">
        <li><button onclick="show('home')">Home</button></li>
        <li><button onclick="show('articles')">Articles</button></li>
    </ul>
    <button onclick="toggleTheme()">Dark/Light Mode</button>
</div>

<main id="content">
    <section id="home">
        <h1>Md. Minhazur Rahman Mahim</h1>
        <p>Biomedical Engineering Student at Islamic University, Kushtia. Passionate researcher, journalist, and social advocate.</p>
    </section>

    <section id="articles" style="display:none;">
        <h1>Bengali Articles</h1>
        <div id="article-list"></div>
    </section>
</main>

<footer>
    <p>&copy; 2026 Md. Minhazur Rahman Mahim</p>
    <a href="https://facebook.com/mdminhazur44rahman">Facebook</a> |
    <a href="https://instagram.com/mdminhazurrahmanmahim">Instagram</a> |
    <a href="https://linkedin.com/in/mdminhazur44rahman">LinkedIn</a>
</footer>

<script>
    const articles = [
        "২৯/ মানবজীবনে টিকার গুরুত্ব", "২৮/ পাবলিক বিশ্ববিদ্যালয়ে শিক্ষকতা", "২৭/ পশ্চাদপদ মানসিকতা পরিহার করুন", 
        "২৬/ বিশ্ববিদ্যালয়ে সিনিয়র-জুনিয়র সম্পর্ক যেমন হওয়া উচিত", "২৫/ বন্ধু নির্বাচনে হতে হবে সতর্ক", 
        "২৪/ ইদ হলো ঐক্যের, ইদ হলো ভাতৃত্বের", "২৩/ শিক্ষার্থীদের ঝরে পড়া রোধ করতে হবে", 
        "২২/ বাংলাদেশ যেভাবে পরিবেশ দূষণের শীর্ষে", "২১/ ইবির অগঠিত ওয়েবসাইট", "২০/ বন্ধ হোক পলিথিন, সন্ধি হোক পাটের সাথে", 
        "১৯/ স্মার্ট বাংলাদেশে কিশোর গ্যাং যখন বিষফোড়া", "১৮/ পরিবার পরিকল্পনা", "১৭/ ইবির অভ্যন্তরে ভাঙ্গা রাস্তা", 
        "১৬/ বাংলাদেশের নদী ও রেল লাইনের পাশের এলাকাগুলো বস্তি থেকে স্বস্তির হবে কবে?", "১৫/ প্রতি জেলায় পাবলিক বিশ্ববিদ্যালয়", 
        "১৪/ সমস্যায় পরিপূর্ণ ইসলামী বিশ্ববিদ্যালয়", "১৩/ বিশ্বের কোথায় ধর্ষণের শাস্তি কেমন", "১২/ বন্ধু হলো জীবনের এক অমূল্য উপহার", 
        "১১/ শৌচাগারে মোবাইল চালানোর অপকারিতা", "১০/ বন্ধ হোক পোষ্য কোটা", "০৯/ তরুণদের চোখে আগামীর বাংলাদেশ", 
        "০৮/ প্রবীণরা অবহেলার স্বীকার না হোক", "০৭/ পাবলিকিয়ান হওয়ার যুদ্ধ", "০৬/ শীতের আর্তনাদ", 
        "০৫/ ইবির জিমনেসিয়ামে যত সমস্যা", "০৪/ সমুন্নত হোক...", "০৩/ শিক্ষা...", "০২/ স্বাস্থ্য...", "০১/ জীবন..."
    ];

    const list = document.getElementById('article-list');
    articles.forEach(title => {
        list.innerHTML += `<div class="card"><h3>${title}</h3><a href="#" class="btn">Read Here</a></div>`;
    });

    function show(id) {
        document.getElementById('home').style.display = id === 'home' ? 'block' : 'none';
        document.getElementById('articles').style.display = id === 'articles' ? 'block' : 'none';
    }
    function toggleTheme() { document.body.classList.toggle('dark'); }
</script>

</body>
</html>
